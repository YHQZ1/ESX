global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ "localhost:9090" ]

  - job_name: order-gateway
    static_configs:
      - targets: [ "host.docker.internal:8080" ]

  - job_name: participant-registry
    static_configs:
      - targets: [ "host.docker.internal:8081" ]

  - job_name: risk-engine
    static_configs:
      - targets: [ "host.docker.internal:8082" ]

  - job_name: matching-engine
    static_configs:
      - targets: [ "host.docker.internal:8083" ]

  - job_name: clearing-house
    static_configs:
      - targets: [ "host.docker.internal:8084" ]

  - job_name: market-data-feed
    static_configs:
      - targets: [ "host.docker.internal:8085" ]

  - job_name: settlement-engine
    static_configs:
      - targets: [ "host.docker.internal:8086" ]

  - job_name: ledger-service
    static_configs:
      - targets: [ "host.docker.internal:8087" ]
